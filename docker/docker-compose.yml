x-producer-env: &producer_env
  SERVER_URL: "${SERVER_URL}"
  COMMANDS_DIR: "${COMMANDS_DIR:-/commands}"
  WIDTH: "${WIDTH:-500}"
  HEIGHT: "${HEIGHT:-500}"
  QUALITY: "${QUALITY:-90}"
  MAV_BAUD: "57600"

x-producer-vols: &producer_vols
  - ../:/app
  - ../commands:/commands
  - /run/udev:/run/udev:ro

x-producer-common: &producer_common
  image: flysearch:latest
  build: 
    context: ..
    dockerfile: Dockerfile
  command: >
    python3 /app/producer_server.py
    --server ${SERVER_URL}
  working_dir: /app
  volumes: *producer_vols
  environment: *producer_env
  tty: true 
  stdin_open: true

services:
  server:
    build: 
      context: ..
      dockerfile: Dockerfile
    image: flysearch:latest
    command: python3 -u /app/client_server.py
    working_dir: /app
    volumes:
      - ../:/app
      - ../uploads:/uploads
    environment:
        PYTHONUNBUFFERED: "1"
        WS_HOST: "${WS_HOST:-0.0.0.0}"
        WS_PORT: "${WS_PORT:-8080}"
        UPLOAD_DIR: "/app/uploads"
        MAX_WS_MB: "${MAX_WS_MB:-25}"
        API_KEY: "${API_KEY}"
    tty: true
    stdin_open: true
    ports: ["8080:8080"]
    profiles: ["server"]
    
  # drone / RPi hardware for actual workflow
  producer:
    <<: *producer_common
    profiles: ["producer"]
    environment:
      <<: *producer_env
      MAV_DEVICE: "/dev/ttyAMA0"
    devices:
      - /dev/video0:/dev/video0
      - /dev/ttyAMA0:/dev/ttyAMA0
    
  # no-drone / laptop-friendly for tests without drone
  producer_test:
    <<: *producer_common
    profiles: ["producer_test"]
    environment:
      <<: *producer_env
      MAV_DEVICE: ""
    privileged: true
    volumes:
      - ../:/app
      - ../commands:/commands
      - /run/udev:/run/udev:ro
      - /dev:/dev
      - /sys:/sys
