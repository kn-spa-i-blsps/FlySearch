services:
  server:
    build: .
    image: flysearch:latest
    command: python3 /app/client_server.py
    working_dir: /app
    volumes:
      - ./:/app
      - ./uploads:/app/uploads
    ports: ["8080:8080"]
    profiles: ["server"]

  producer:
    image: flysearch:latest
    build: .
    command: >
      python3 /app/producer_server.py
      --server ${SERVER_URL}
      --fname ${FNAME:-photo.jpg}
    working_dir: /app
    volumes:
      - ./:/app
      - ./img:/img
      - /run/udev:/run/udev:ro
    environment:
      IMG_DIR: /img
    # na start wygodnie:
    privileged: true
    # po testach usuń privileged i dopisz konkretne device'y:
    # devices:
    #  - /dev/media0:/dev/media0
    #  - /dev/media1:/dev/media1
    #  - /dev/video0:/dev/video0
    profiles: ["producer"]