services:
  server:
    build: 
      context: ..
      dockerfile: Dockerfile
    image: flysearch:latest
    command: python3 -u /app/client_server.py
    working_dir: /app
    volumes:
      - ../:/app
      - ../uploads:/uploads
    environment:
        PYTHONUNBUFFERED: "1"
        WS_HOST: "${WS_HOST:-0.0.0.0}"
        WS_PORT: "${WS_PORT:-8080}"
        UPLOAD_DIR: "/app/uploads"
        MAX_WS_MB: "${MAX_WS_MB:-25}"
        API_KEY: "${API_KEY}"
    tty: true
    stdin_open: true
    ports: ["8080:8080"]
    profiles: ["server"]

  producer:
    image: flysearch:latest
    build: 
      context: ..
      dockerfile: Dockerfile
    command: >
      python3 /app/producer_server.py
      --server ${SERVER_URL}
      --fname ${FNAME:-photo.jpg}
    working_dir: /app
    volumes:
      - ../:/app
      - ../img:/img
      - ../commands:/commands
      - /run/udev:/run/udev:ro
    environment:
      SERVER_URL: "${SERVER_URL}"
      IMG_DIR: "${IMG_DIR:-/img}"
      COMMANDS_DIR: "${COMMANDS_DIR:-/commands}"
      CAPTURE_PY: "${CAPTURE_PY:-/app/capture.py}"
      FNAME: "${FNAME:-photo.jpg}"
      WIDTH: "${WIDTH:-500}"
      HEIGHT: "${HEIGHT:-500}"
      QUALITY: "${QUALITY:-90}"
      EXECUTE_MOVES: "1"      # domyślnie 0 (OFF)
      MAV_DEVICE: "/dev/ttyACM0"
      MAV_BAUD: "57600"
    tty: true 
    stdin_open: true
    # na start wygodnie:
    privileged: true
    # po testach usuń privileged i dopisz konkretne device'y:
    # devices:
    #  - /dev/media0:/dev/media0
    #  - /dev/media1:/dev/media1
    #  - /dev/video0:/dev/video0
    profiles: ["producer"]